<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0b;
      --surface: #111113;
      --border: #1e1e22;
      --text: #f0ede8;
      --muted: #5a5a65;
      --accent: #c8ff57;
      --accent-dim: #a8d944;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* glowing orb */
    body::after {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,255,87,0.07) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem;
    }

    .tag {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(200,255,87,0.08);
      border: 1px solid rgba(200,255,87,0.2);
      padding: 0.3em 0.9em;
      border-radius: 2px;
      margin-bottom: 2rem;
      animation: fadeUp 0.6s ease both;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3.5rem, 10vw, 7rem);
      line-height: 0.95;
      letter-spacing: -0.03em;
      text-align: center;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .sub {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      max-width: 360px;
      line-height: 1.6;
      margin-bottom: 3.5rem;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6em;
      padding: 0.85em 1.8em;
      border-radius: 3px;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      position: relative;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #0a0a0b;
      border: none;
    }

    .btn-primary:hover {
      background: #d6ff6e;
      box-shadow: 0 0 32px rgba(200,255,87,0.35);
      transform: translateY(-2px);
    }

    .btn-primary svg { color: #0a0a0b; }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: #3a3a44;
      background: var(--surface);
      transform: translateY(-2px);
    }

    /* corner decorations */
    .corner {
      position: fixed;
      width: 60px;
      height: 60px;
      opacity: 0.25;
    }
    .corner--tl { top: 1.5rem; left: 1.5rem; border-top: 1px solid var(--muted); border-left: 1px solid var(--muted); }
    .corner--br { bottom: 1.5rem; right: 1.5rem; border-bottom: 1px solid var(--muted); border-right: 1px solid var(--muted); }

    .version {
      position: fixed;
      bottom: 1.8rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="corner corner--tl"></div>
  <div class="corner corner--br"></div>

  <div class="wrapper">
    <span class="tag">Now available</span>

    <h1>Your app,<br><em>your way.</em></h1>

    <p class="sub">
      Install on Android or create an account to get started.
      No fluff, no tracking.
    </p>

    <div class="buttons">
      <a href="/downloads" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download APK
      </a>
      <a href="/register" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Get an account
      </a>
    </div>
  </div>

  <span class="version">v1.0</span>

</body>
</html>
